{% extends 'base.html' %}
{% block content %}
<section class="admin-section">
    <h2>Edit Team Member</h2>
    
    <form method="POST" enctype="multipart/form-data" class="contact-form">
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <label>
            Name *
            <input type="text" name="name" required value="{{ team_member.name }}">
        </label>
        
        <label>
            Role *
            <input type="text" name="role" required value="{{ team_member.role }}">
        </label>
        
        <label>
            Bio
            <textarea name="bio" placeholder="Brief biography or description" rows="4">{{ team_member.bio or '' }}</textarea>
        </label>
        
        <label>
            Background Image
            {% if team_member.image_filename %}
            <p class="info-text">Current: {{ team_member.image_filename }}</p>
            {% endif %}
            <input type="file" name="image" accept="image/*" placeholder="Upload a new image to replace">
        </label>
        
        <label>
            Display Order
            <input type="number" name="display_order" value="{{ team_member.display_order or 0 }}">
        </label>
        
        <div class="form-actions">
            <button type="submit" class="button">Update Team Member</button>
            <a href="{{ url_for('admin_team') }}" class="button button-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
