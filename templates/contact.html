{% extends 'base.html' %}
{% block content %}
<section class="contact-section">
    <p class="section-title">Get in Touch</p>
    <h1>Contact Us</h1>
    <p>Ready to start your next film project? Send us a message and we’ll be in touch.</p>
    {% if error %}
        <div class="flash-message flash-error">{{ error }}</div>
    {% endif %}
    <div class="contact-grid">
        <div class="contact-box">
            <p>Email: hello@filmproduction.com</p>
            <p>Phone: +1 234 567 890</p>
            <p>Location: Los Angeles, CA</p>
        </div>
        <form method="post" class="contact-form" enctype="multipart/form-data">
            <label>
                Full Name
                <input type="text" name="name" value="{{ form_data.name if form_data else '' }}" required>
            </label>
            <label>
                Email Address
                <input type="email" name="email" value="{{ form_data.email if form_data else '' }}" required>
            </label>
            <label>
                Message
                <textarea name="message" rows="6" required>{{ form_data.message if form_data else '' }}</textarea>
            </label>
            <label>
                Attachment (optional)
                <input type="file" name="attachment">
            </label>
            <button type="submit" class="button">Send Message</button>
        </form>
    </div>
</section>
{% endblock %}
