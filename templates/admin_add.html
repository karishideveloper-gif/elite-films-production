{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
    <p class="section-title">Admin Management</p>
    <div class="auth-panel">
        <h1>Create a New Admin</h1>
        <p>Register a new administrator account with its own secure password.</p>
        {% if error %}
            <div class="flash-message flash-error">{{ error }}</div>
        {% endif %}
        <form method="post" class="auth-form">
            <label>
                Admin Username
                <input type="text" name="username" required placeholder="newadmin">
            </label>
            <label>
                Password
                <input type="password" name="password" required placeholder="••••••••">
            </label>
            <label>
                Confirm Password
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </label>
            <button type="submit" class="button">Create Admin</button>
        </form>
    </div>
</section>
{% endblock %}
