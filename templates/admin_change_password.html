{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
    <p class="section-title">Admin Security</p>
    <div class="auth-panel">
        <h1>Change Your Password</h1>
        <p>Update your password to protect the admin dashboard after too many failed login attempts.</p>
        {% if error %}
            <div class="flash-message flash-error">{{ error }}</div>
        {% endif %}
        <form method="post" class="auth-form">
            {% if reset %}
                <label>
                    Username
                    <input type="text" name="username" required placeholder="admin" value="{{ username or '' }}">
                </label>
            {% endif %}
            <label>
                Current Password
                <input type="password" name="current_password" required placeholder="••••••••">
            </label>
            <label>
                New Password
                <input type="password" name="new_password" required placeholder="••••••••">
            </label>
            <label>
                Confirm New Password
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </label>
            <button type="submit" class="button">Update Password</button>
        </form>
    </div>
</section>
{% endblock %}
